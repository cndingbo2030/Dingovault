name: Test

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Regression guard (old module path)
        run: |
          if git grep -n "github.com/dingbo/dingovault" -- . ":(exclude).github/workflows/test.yml"; then
            echo "Found legacy module path github.com/dingbo/dingovault"
            exit 1
          fi

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Go test
        run: go test ./...

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v1.64.8
          install-mode: goinstall
