# Cross-platform release: SaaS CLI binaries + Wails desktop + Android (gomobile) on version tags (v*).
# Asset names follow a semantic pattern (see Makefile RELEASE_* variables for local parity).
name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  pull-requests: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go test ./...

  # OCI image for SaaS server → GitHub Container Registry (populates repo Packages).
  docker-ghcr:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: GHCR image name (lowercase)
        id: ghcr
        run: |
          o="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "image=ghcr.io/${o}/dingovault" >> "$GITHUB_OUTPUT"
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.ghcr.outputs.image }}:${{ github.ref_name }}
            ${{ steps.ghcr.outputs.image }}:latest
          build-args: |
            VERSION=${{ github.ref_name }}

  # Stub SDK on GitHub Packages npm registry for future plugin authors.
  publish-sdk-npm:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://npm.pkg.github.com"
          scope: "@cndingbo2030"
      - name: Set package version from tag
        run: |
          node <<'NODE'
          const fs = require('fs');
          const p = require('./sdk/package.json');
          const v = process.env.GITHUB_REF_NAME.replace(/^v/, '');
          if (!/^\d+\.\d+\.\d+/.test(v)) {
            throw new Error('tag must look like vMAJOR.MINOR.PATCH, got ' + process.env.GITHUB_REF_NAME);
          }
          p.version = v;
          fs.writeFileSync('sdk/package.json', JSON.stringify(p, null, 2) + '\n');
          NODE
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
      - name: Publish @cndingbo2030/dingovault-sdk
        run: npm publish
        working-directory: sdk
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Static SaaS / API binary (no CGO) — works everywhere.
  build-server:
    needs: test
    env:
      GO_LDFLAGS: -s -w -X github.com/cndingbo2030/dingovault/internal/version.String=${{ github.ref_name }}
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: Linux-Server-amd64
          - goos: windows
            goarch: amd64
            suffix: Windows-Server-amd64.exe
          - goos: darwin
            goarch: amd64
            suffix: macOS-Server-Intel-amd64
          - goos: darwin
            goarch: arm64
            suffix: macOS-Server-Apple-Silicon-arm64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          out="Dingovault-${{ github.ref_name }}-${{ matrix.suffix }}"
          go build -trimpath -ldflags="${GO_LDFLAGS}" -o "$out" ./cmd/dingovault
          chmod +x "$out" 2>/dev/null || true
      - uses: actions/upload-artifact@v4
        with:
          name: server-${{ matrix.goos }}-${{ matrix.goarch }}
          path: Dingovault-${{ github.ref_name }}-${{ matrix.suffix }}

  wails-linux:
    needs: test
    runs-on: ubuntu-22.04
    env:
      GO_LDFLAGS: -s -w -X github.com/cndingbo2030/dingovault/internal/version.String=${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install webview deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libgtk-3-dev libwebkit2gtk-4.0-dev
      - run: npm ci --prefix frontend && npm run build --prefix frontend
      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest
      - name: Build desktop (Linux)
        run: |
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
          wails build -platform linux/amd64 -o dingovault -ldflags "${GO_LDFLAGS}"
      - name: Pack (semantic name)
        run: |
          tar -czvf "Dingovault-${{ github.ref_name }}-Linux-Desktop-amd64.tar.gz" -C build/bin .
      - uses: actions/upload-artifact@v4
        with:
          name: wails-linux-amd64
          path: Dingovault-${{ github.ref_name }}-Linux-Desktop-amd64.tar.gz

  wails-macos:
    needs: test
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - arch: amd64
            zip_suffix: macOS-Intel-Processor
          - arch: arm64
            zip_suffix: macOS-Apple-Silicon-M1-M2-M3
    env:
      GO_LDFLAGS: -s -w -X github.com/cndingbo2030/dingovault/internal/version.String=${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci --prefix frontend && npm run build --prefix frontend
      - run: go install github.com/wailsapp/wails/v2/cmd/wails@latest
      - name: Build desktop (macOS)
        run: |
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
          wails build -platform darwin/${{ matrix.arch }} -o Dingovault -ldflags "${GO_LDFLAGS}"
      - name: Pack (semantic name)
        run: |
          chmod +x build/bin/Dingovault.app/Contents/MacOS/Dingovault || true
          cd build/bin && zip -r "../../Dingovault-${{ github.ref_name }}-${{ matrix.zip_suffix }}.zip" Dingovault.app
      - uses: actions/upload-artifact@v4
        with:
          name: wails-macos-${{ matrix.arch }}
          path: Dingovault-${{ github.ref_name }}-${{ matrix.zip_suffix }}.zip

  wails-windows:
    needs: test
    runs-on: windows-latest
    env:
      GO_LDFLAGS: -s -w -X github.com/cndingbo2030/dingovault/internal/version.String=${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install MSYS2 GCC (CGO)
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: mingw-w64-x86_64-gcc mingw-w64-x86_64-pkg-config
      - run: npm ci --prefix frontend && npm run build --prefix frontend
      - run: go install github.com/wailsapp/wails/v2/cmd/wails@latest
      - name: Build desktop (Windows)
        shell: cmd
        run: |
          set PATH=%PATH%;%USERPROFILE%\go\bin
          set PATH=C:\msys64\mingw64\bin;%PATH%
          set CGO_ENABLED=1
          wails build -platform windows/amd64 -o dingovault.exe -ldflags "%GO_LDFLAGS%"
      - name: Rename installer (semantic name)
        shell: pwsh
        run: |
          Copy-Item -Force "build/bin/dingovault.exe" "Dingovault-${{ github.ref_name }}-Windows-64bit-Installer.exe"
      - uses: actions/upload-artifact@v4
        with:
          name: wails-windows-amd64
          path: Dingovault-${{ github.ref_name }}-Windows-64bit-Installer.exe

  # gomobile .aar + Gradle shell → universal APK + AAB. NDK paths are pinned for gomobile init/bind.
  android:
    needs: test
    runs-on: ubuntu-latest
    env:
      GO_LDFLAGS: -s -w -X github.com/cndingbo2030/dingovault/internal/version.String=${{ github.ref_name }}
      NDK_VER: "26.1.10909125"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: "12266719"
          packages: "platform-tools platforms;android-34 build-tools;34.0.0 ndk;26.1.10909125"

      - name: Resolve SDK / NDK paths (gomobile + Gradle)
        run: |
          set -euxo pipefail
          SDK="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-}}"
          if [ -z "$SDK" ] || [ ! -d "$SDK" ]; then
            echo "ANDROID_SDK_ROOT not set or missing"
            exit 1
          fi
          # cmdline-tools: add first versioned bin dir (setup-android may not symlink "latest")
          if [ -d "$SDK/cmdline-tools/latest/bin" ]; then
            echo "$SDK/cmdline-tools/latest/bin" >> "$GITHUB_PATH"
          else
            for d in "$SDK/cmdline-tools"/*; do
              if [ -x "$d/bin/sdkmanager" ]; then
                echo "$d/bin" >> "$GITHUB_PATH"
                break
              fi
            done
          fi
          echo "ANDROID_SDK_ROOT=$SDK" >> "$GITHUB_ENV"
          echo "ANDROID_HOME=$SDK" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_HOME=$SDK/ndk/${NDK_VER}" >> "$GITHUB_ENV"
          echo "NDK_HOME=$SDK/ndk/${NDK_VER}" >> "$GITHUB_ENV"
          # gomobile / older tooling sometimes expect $ANDROID_HOME/ndk-bundle
          ln -sfn "$SDK/ndk/${NDK_VER}" "$SDK/ndk-bundle"
          test -d "$SDK/ndk/${NDK_VER}"

      - name: Install gomobile (after NDK is on disk)
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          gomobile init

      - name: gomobile bind (AAR)
        run: |
          gomobile bind -androidapi=24 \
            -ldflags="-s -w -X github.com/cndingbo2030/dingovault/internal/version.String=${{ github.ref_name }}" \
            -o "Dingovault-${{ github.ref_name }}-Android-Library-AAR.aar" \
            -target=android \
            ./cmd/dingovault-android/mobile

      - name: Gradle assembleRelease + bundleRelease
        run: |
          set -euxo pipefail
          cp "Dingovault-${{ github.ref_name }}-Android-Library-AAR.aar" cmd/dingovault-android/android-shell/app/libs/dingovault-mobile.aar
          GRADLE_VER=8.7
          curl -fsSL "https://services.gradle.org/distributions/gradle-${GRADLE_VER}-bin.zip" -o /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp
          export PATH="/tmp/gradle-${GRADLE_VER}/bin:$PATH"
          cd cmd/dingovault-android/android-shell
          gradle wrapper --gradle-version "${GRADLE_VER}"
          chmod +x gradlew
          ./gradlew assembleRelease bundleRelease --no-daemon
          APK_SRC="app/build/outputs/apk/release/app-release.apk"
          AAB_SRC="app/build/outputs/bundle/release/app-release.aab"
          test -f "$APK_SRC"
          test -f "$AAB_SRC"
          cp "$APK_SRC" "${GITHUB_WORKSPACE}/Dingovault-${{ github.ref_name }}-Android-Mobile-Phone-Tablet.apk"
          cp "$AAB_SRC" "${GITHUB_WORKSPACE}/Dingovault-${{ github.ref_name }}-Android-Play-Bundle.aab"

      - uses: actions/upload-artifact@v4
        with:
          name: android-mobile
          path: |
            Dingovault-${{ github.ref_name }}-Android-Library-AAR.aar
            Dingovault-${{ github.ref_name }}-Android-Mobile-Phone-Tablet.apk
            Dingovault-${{ github.ref_name }}-Android-Play-Bundle.aab

  publish:
    needs: [build-server, wails-linux, wails-macos, wails-windows, android]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build categorized changelog
        id: changelog
        uses: mikepenz/release-changelog-builder-action@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          failOnError: false
          toTag: ${{ github.ref_name }}
          configurationJson: |
            {
              "template": "#{{CHANGELOG}}\n\n<details><summary>Compare</summary>\n\n#{{RELEASE_DIFF}}\n\n</details>",
              "categories": [
                { "title": "## Features", "labels": ["feature", "enhancement"] },
                { "title": "## Fixes", "labels": ["fix", "bug"] },
                { "title": "## Other", "labels": [] }
              ]
            }

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten for upload (semantic filenames)
        run: |
          set -euxo pipefail
          VER="${{ github.ref_name }}"
          mkdir -p upload
          cp "artifacts/server-linux-amd64/Dingovault-${VER}-Linux-Server-amd64" upload/
          cp "artifacts/server-windows-amd64/Dingovault-${VER}-Windows-Server-amd64.exe" upload/
          cp "artifacts/server-darwin-amd64/Dingovault-${VER}-macOS-Server-Intel-amd64" upload/
          cp "artifacts/server-darwin-arm64/Dingovault-${VER}-macOS-Server-Apple-Silicon-arm64" upload/
          cp "artifacts/wails-linux-amd64/Dingovault-${VER}-Linux-Desktop-amd64.tar.gz" upload/
          cp "artifacts/wails-macos-amd64/Dingovault-${VER}-macOS-Intel-Processor.zip" upload/
          cp "artifacts/wails-macos-arm64/Dingovault-${VER}-macOS-Apple-Silicon-M1-M2-M3.zip" upload/
          cp "artifacts/wails-windows-amd64/Dingovault-${VER}-Windows-64bit-Installer.exe" upload/
          cp "artifacts/android-mobile/Dingovault-${VER}-Android-Library-AAR.aar" upload/
          cp "artifacts/android-mobile/Dingovault-${VER}-Android-Mobile-Phone-Tablet.apk" upload/
          cp "artifacts/android-mobile/Dingovault-${VER}-Android-Play-Bundle.aab" upload/

      - name: Generate checksums
        run: |
          cd upload
          shasum -a 256 * > sha256sums.txt

      - name: Write release body prefix (categorized changelog)
        env:
          CHANGELOG: ${{ steps.changelog.outputs.changelog }}
        run: |
          printf '%s\n\n---\n' "$CHANGELOG" > release_body.md

      - name: Append GHCR & npm package hints
        run: |
          {
            echo ""
            echo "## Container image (GHCR)"
            echo ""
            echo '```bash'
            echo "docker pull ghcr.io/cndingbo2030/dingovault:${{ github.ref_name }}"
            echo '```'
            echo ""
            echo "## npm stub (GitHub Packages)"
            echo ""
            echo 'Install `@cndingbo2030/dingovault-sdk` per [`sdk/README.md`](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/sdk/README.md) (GitHub npm registry).'
          } >> release_body.md

      - uses: softprops/action-gh-release@v2
        with:
          draft: false
          body_path: release_body.md
          generate_release_notes: true
          append_body: true
          files: upload/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
