# Cross-platform release: SaaS CLI binaries + Wails desktop builds when you push a version tag (v*).
name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go test ./...

  # Static SaaS / API binary (no CGO) — works everywhere.
  build-server:
    needs: test
    env:
      GO_LDFLAGS: -s -w -X github.com/cndingbo2030/dingovault/internal/version.String=${{ github.ref_name }}
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: windows
            goarch: amd64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          out="dingovault-${{ github.ref_name }}-${{ matrix.goos }}-${{ matrix.goarch }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then out="$out.exe"; fi
          go build -trimpath -ldflags="${GO_LDFLAGS}" -o "$out" ./cmd/dingovault
      - uses: actions/upload-artifact@v4
        with:
          name: server-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dingovault-${{ github.ref_name }}-*

  wails-linux:
    needs: test
    runs-on: ubuntu-22.04
    env:
      GO_LDFLAGS: -s -w -X github.com/cndingbo2030/dingovault/internal/version.String=${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install webview deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libgtk-3-dev libwebkit2gtk-4.0-dev
      - run: npm ci --prefix frontend && npm run build --prefix frontend
      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest
      - name: Build desktop (Linux)
        run: |
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH
          wails build -platform linux/amd64 -o dingovault -ldflags "${GO_LDFLAGS}"
      - name: Pack
        run: tar -czvf dingovault-${{ github.ref_name }}-linux-amd64.tar.gz -C build/bin .
      - uses: actions/upload-artifact@v4
        with:
          name: wails-linux-amd64
          path: dingovault-${{ github.ref_name }}-linux-amd64.tar.gz

  wails-macos:
    needs: test
    runs-on: macos-latest
    env:
      GO_LDFLAGS: -s -w -X github.com/cndingbo2030/dingovault/internal/version.String=${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci --prefix frontend && npm run build --prefix frontend
      - run: go install github.com/wailsapp/wails/v2/cmd/wails@latest
      - name: Build desktop (macOS)
        run: |
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH
          wails build -platform darwin/universal -o Dingovault -ldflags "${GO_LDFLAGS}"
      - name: Pack
        run: cd build/bin && zip -r ../../dingovault-${{ github.ref_name }}-macos-universal.zip Dingovault.app
      - uses: actions/upload-artifact@v4
        with:
          name: wails-macos-universal
          path: dingovault-${{ github.ref_name }}-macos-universal.zip

  wails-windows:
    needs: test
    runs-on: windows-latest
    env:
      GO_LDFLAGS: -s -w -X github.com/cndingbo2030/dingovault/internal/version.String=${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install MSYS2 GCC (CGO)
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: mingw-w64-x86_64-gcc mingw-w64-x86_64-pkg-config
      - run: npm ci --prefix frontend && npm run build --prefix frontend
      - run: go install github.com/wailsapp/wails/v2/cmd/wails@latest
      - name: Build desktop (Windows)
        shell: cmd
        run: |
          set PATH=%PATH%;%USERPROFILE%\go\bin
          set PATH=C:\msys64\mingw64\bin;%PATH%
          set CGO_ENABLED=1
          wails build -platform windows/amd64 -o dingovault.exe -ldflags "%GO_LDFLAGS%"
      - uses: actions/upload-artifact@v4
        with:
          name: wails-windows-amd64
          path: build/bin/dingovault.exe

  publish:
    needs: [build-server, wails-linux, wails-macos, wails-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build categorized changelog
        id: changelog
        uses: mikepenz/release-changelog-builder-action@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          failOnError: false
          toTag: ${{ github.ref_name }}
          configurationJson: |
            {
              "template": "#{{CHANGELOG}}\n\n<details><summary>Compare</summary>\n\n#{{RELEASE_DIFF}}\n\n</details>",
              "categories": [
                { "title": "## Features", "labels": ["feature", "enhancement"] },
                { "title": "## Fixes", "labels": ["fix", "bug"] },
                { "title": "## Other", "labels": [] }
              ]
            }

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten for upload
        run: |
          mkdir -p upload
          cp artifacts/server-linux-amd64/dingovault-${{ github.ref_name }}-linux-amd64 upload/
          cp artifacts/server-windows-amd64/dingovault-${{ github.ref_name }}-windows-amd64.exe upload/
          cp artifacts/server-darwin-amd64/dingovault-${{ github.ref_name }}-darwin-amd64 upload/
          cp artifacts/server-darwin-arm64/dingovault-${{ github.ref_name }}-darwin-arm64 upload/
          cp artifacts/wails-linux-amd64/dingovault-${{ github.ref_name }}-linux-amd64.tar.gz upload/
          cp artifacts/wails-macos-universal/dingovault-${{ github.ref_name }}-macos-universal.zip upload/
          cp artifacts/wails-windows-amd64/dingovault.exe upload/dingovault-${{ github.ref_name }}-windows-amd64-wails.exe

      - name: Generate checksums
        run: |
          cd upload
          shasum -a 256 * > sha256sums.txt

      - name: Write release body prefix (categorized changelog)
        env:
          CHANGELOG: ${{ steps.changelog.outputs.changelog }}
        run: |
          printf '%s\n\n---\n' "$CHANGELOG" > release_body.md

      - uses: softprops/action-gh-release@v2
        with:
          draft: false
          body_path: release_body.md
          generate_release_notes: true
          append_body: true
          files: upload/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
